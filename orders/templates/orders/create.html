{% extends "orders/base.html" %}

{% block title %}发布需求 - CampusBite{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card animate-in">
            <div class="card-body">
                <h3 class="page-title mb-4">发布代取需求</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="title" class="form-label">包裹简述 <span class="required">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" placeholder="如：中通快递小包裹" value="{{ form_data.title|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">详细描述</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="可选填写包裹大小、特殊要求等">{{ form_data.description|default:'' }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="location" class="form-label">快递点 <span class="required">*</span></label>
                            <select class="form-select" id="location" name="location" required>
                                <option value="">请选择快递点</option>
                                {% for value, label in locations %}
                                    <option value="{{ value }}" {% if form_data.location == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="reward" class="form-label">报酬金额 (元) <span class="required">*</span></label>
                            <input type="number" class="form-control" id="reward" name="reward" step="0.01" min="0" placeholder="如：3.00" value="{{ form_data.reward|default:'' }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="pickup_code" class="form-label">取件码</label>
                        <input type="text" class="form-control" id="pickup_code" name="pickup_code" placeholder="可选" value="{{ form_data.pickup_code|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label for="contact" class="form-label">联系方式 <span class="required">*</span></label>
                        <input type="text" class="form-control" id="contact" name="contact" placeholder="如：微信号 / 手机号" value="{{ form_data.contact|default:'' }}" required>
                    </div>
                    <button type="submit" class="btn btn-accent w-100 mt-1">发布需求</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
